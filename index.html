<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ZOVRAKE</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
<!--principal-->
    <section class="hero">

        <video class="hero-video" autoplay muted loop playsinline>

            <source src="VIDEO/Zovrake.mp4" type="video/mp4">

        </video>

        <div class="overlay"></div>

        <header class="header">
<!--Menu principal-->
            <button class="menu-button" id="menu-button">

                <span class="menu-icon">☰</span>

                <span class="menu-text">MENÚ</span>

            </button>
            <!--Asesor IA-->
            <button class="ia-button" id="ia-button">

                💬

            </button>

        </header>
<!--principal title-->
        <div class="hero-content">

            <h1 class="hero-brand">

                ZOVRAKE

            </h1>

            <h2 class="subtitle">

                IMPULSANDO LA NUEVA ERA EMPRESARIAL

            </h2>
<!--Registros-->
            <button class="cta-button" id="continue-zovrake">

                CONTINUAR

            </button>

        </div>

    </section>


<!-- PASO 1 -->
<section class="auth-screen">

    <div class="auth-card">

        <h2 class="auth-brand">

            ZOVRAKE

        </h2>

        <h1 class="auth-title">

            CREA EL FUTURO DE TU EMPRESA

        </h1>

        <p class="auth-description">

            Accede a herramientas diseñadas para impulsar tu crecimiento.

        </p>

        <!-- Google -->
        <button class="google-button" id="google-login">

            Continuar con Google

        </button>
        <div id="google-button-container" style="display:none;"></div>

        <div class="separator">

            <span>O</span>

        </div>

        <!-- Correo -->
        <input
            type="email"
            class="email-input"
            id="email-zovrake"
            placeholder="Introduce tu correo"
            required

        >

        <button class="email-button" id="email-continue">

            Continuar con correo electrónico

        </button>

        <p class="privacy-text">

            Al continuar, aceptas nuestras Políticas de Privacidad.

        </p>

    </div>

</section>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="script.js"></script>


</body>

</html>
